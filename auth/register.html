<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="../index.html">← Home</a>
</header>

<div class="form-container">
  <div class="form-box" style="max-width:460px;">
    <h2>Create Account</h2>
    <div id="alert-box"></div>

    <!-- Step 1: Registration Form -->
    <div id="step-register">
      <form onsubmit="handleSendOtp(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name" required>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Re-enter password" required>
        </div>
        <div class="input-group">
          <label>I am a...</label>
          <select id="role">
            <option value="seeker">Job Seeker</option>
            <option value="employer">Employer</option>
          </select>
        </div>
        <button type="submit" id="register-btn" style="width:100%;margin-top:10px;">
          Send Verification Code
        </button>
      </form>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="step-otp" style="display:none;">
      <p style="color:#555;font-size:14px;margin-bottom:20px;">
        A 6-digit code was sent to your email. Enter it below to verify your account.
      </p>
      <form onsubmit="handleVerifyOtp(event)">
        <div class="input-group">
          <label>Verification Code (OTP)</label>
          <input type="text" id="otp" placeholder="e.g. 123456" maxlength="6"
                 style="font-size:24px;letter-spacing:8px;text-align:center;" required>
        </div>
        <button type="submit" id="verify-btn" style="width:100%;margin-top:10px;">
          Verify & Create Account
        </button>
      </form>
      <button onclick="document.getElementById('step-otp').style.display='none';
                       document.getElementById('step-register').style.display='block';"
              class="secondary" style="width:100%;margin-top:10px;">
        ← Back
      </button>
    </div>

    <p style="margin-top:16px;font-size:14px;">
      Already have an account? <a href="login.html" style="color:#0a66c2;">Login</a>
    </p>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
