<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="../index.html">← Home</a>
</header>

<div class="form-container">
  <div class="form-box">
    <h2>Welcome Back</h2>
    <p style="color:#888;font-size:14px;margin-bottom:20px;">Sign in to your account</p>
    <div id="alert-box"></div>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="login-btn" style="width:100%;margin-top:10px;">Login</button>
    </form>

    <p style="margin-top:16px;font-size:14px;">
      <a href="forgot-password.html" style="color:#0a66c2;">Forgot password?</a>
    </p>
    <p style="margin-top:10px;font-size:14px;">
      No account? <a href="register.html" style="color:#0a66c2;">Register here</a>
    </p>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
