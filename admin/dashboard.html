<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK <span style="font-size:13px;opacity:.7;">Admin</span></h2>
  <nav>
    <a href="manage-users.html">Users</a>
    <a href="manage-jobs.html">Jobs</a>
    <a href="manage-applications.html">Applications</a>
    <a href="reports.html">Reports</a>
  </nav>
  <div>
    <span id="admin-name" style="color:white;font-size:14px;margin-right:12px;"></span>
    <a href="#" onclick="logout()" style="color:#ffd700;">Logout</a>
  </div>
</header>

<div class="container">
  <h2 class="title">Admin Control Center</h2>

  <div class="dashboard-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:30px;">
    <div class="card" style="cursor:default;">
      <p class="stat-value blue" id="s-users">--</p>
      <p class="stat-label">Total Users</p>
    </div>
    <div class="card" style="cursor:default;">
      <p class="stat-value blue" id="s-jobs">--</p>
      <p class="stat-label">Total Jobs</p>
    </div>
    <div class="card" style="cursor:default;">
      <p class="stat-value blue" id="s-apps">--</p>
      <p class="stat-label">Applications</p>
    </div>
    <div class="card" style="cursor:default;">
      <p class="stat-value green" id="s-accepted">--</p>
      <p class="stat-label">Accepted</p>
    </div>
    <div class="card" style="cursor:default;">
      <p class="stat-value blue" id="s-employers">--</p>
      <p class="stat-label">Employers</p>
    </div>
    <div class="card" style="cursor:default;">
      <p class="stat-value blue" id="s-seekers">--</p>
      <p class="stat-label">Seekers</p>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="card" onclick="location.href='manage-jobs.html'">📋 Manage Jobs</div>
    <div class="card" onclick="location.href='manage-users.html'">👥 Manage Users</div>
    <div class="card" onclick="location.href='manage-applications.html'">📄 Applications</div>
    <div class="card" onclick="location.href='reports.html'">📊 Reports</div>
  </div>

  <h3 style="margin:30px 0 16px;color:#0a66c2;">Recent Users</h3>
  <div class="table-container" style="width:100%;">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
      <tbody id="recent-users"><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<footer><p>© 2026 JSTACK</p></footer>

<script src="../assets/js/main.js"></script>
<script>
  async function init() {
    const user = await requireRole('admin');
    if (!user) return;
    document.getElementById('admin-name').textContent = '👤 ' + escHtml(user.name);

    const res = await apiGet('/dashboard-stats.php');
    if (res.success) {
      const s = res.stats;
      document.getElementById('s-users').textContent     = s.total_users;
      document.getElementById('s-jobs').textContent      = s.total_jobs;
      document.getElementById('s-apps').textContent      = s.total_applications;
      document.getElementById('s-accepted').textContent  = s.accepted_applications;
      document.getElementById('s-employers').textContent = s.total_employers;
      document.getElementById('s-seekers').textContent   = s.total_seekers;

      const tbody = document.getElementById('recent-users');
      if (res.recent_users && res.recent_users.length) {
        tbody.innerHTML = res.recent_users.map(u => `
          <tr>
            <td>${escHtml(u.name)}</td>
            <td>${escHtml(u.email)}</td>
            <td><span class="badge badge-info">${u.role.toUpperCase()}</span></td>
            <td>${new Date(u.created_at).toLocaleDateString()}</td>
          </tr>`).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="4">No users yet.</td></tr>';
      }
    }
  }
  init();
</script>
</body>
</html>
