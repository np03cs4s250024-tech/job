<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="dashboard.html" style="color:white;">← Dashboard</a>
</header>

<div class="profile-card" style="max-width:600px;">
  <h3>Edit Professional Profile</h3>
  <div id="alert-box"></div>
  <div class="input-group"><label>Full Name</label><input type="text" id="fullname" placeholder="Your full name"></div>
  <div class="input-group"><label>Phone</label><input type="text" id="phone" placeholder="+977 98XXXXXXXX"></div>
  <div class="input-group"><label>Skills</label><input type="text" id="skills" placeholder="PHP, MySQL, JavaScript"></div>
  <div class="input-group"><label>Experience</label><input type="text" id="experience" placeholder="e.g. 2 years"></div>
  <div class="input-group"><label>Professional Bio</label><textarea id="bio" rows="4" placeholder="About you..."></textarea></div>
  <button id="save-btn" onclick="handleSave()" style="width:100%;">Save Profile</button>
</div>

<footer><p>© 2026 JSTACK</p></footer>

<script src="../assets/js/main.js"></script>
<script>
  async function init() {
    await requireRole('seeker');
    const data = await apiGet('/profiles.php');
    if (data) {
      document.getElementById('fullname').value   = data.name       || '';
      document.getElementById('phone').value      = data.phone      || '';
      document.getElementById('skills').value     = data.skills     || '';
      document.getElementById('experience').value = data.experience || '';
      document.getElementById('bio').value        = data.bio        || '';
    }
  }

  async function handleSave() {
    setLoading('save-btn', true);
    const res = await apiPut('/profiles.php', {
      name:       document.getElementById('fullname').value.trim(),
      phone:      document.getElementById('phone').value.trim(),
      skills:     document.getElementById('skills').value.trim(),
      experience: document.getElementById('experience').value.trim(),
      bio:        document.getElementById('bio').value.trim(),
    });
    setLoading('save-btn', false);
    showAlert('alert-box', res.success ? 'Profile saved!' : (res.error||'Save failed.'), res.success?'success':'error');
  }

  init();
</script>
</body>
</html>
