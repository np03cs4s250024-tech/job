<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="dashboard.html" style="color:white;">← Dashboard</a>
</header>

<div class="container">
  <h2 class="title">My Applications</h2>
  <div class="table-container" style="width:100%;">
    <table>
      <thead><tr><th>Job Title</th><th>Company</th><th>Location</th><th>Applied On</th><th>Status</th></tr></thead>
      <tbody id="apps-table"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<footer><p>© 2026 JSTACK</p></footer>

<script src="../assets/js/main.js"></script>
<script>
  async function init() {
    await requireRole('seeker');
    const data = await apiGet('/applications.php?mine=1');
    const tbody = document.getElementById('apps-table');
    if (!Array.isArray(data) || !data.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No applications yet. <a href="../jobs/listing.html">Browse jobs</a></td></tr>'; return;
    }
    tbody.innerHTML = data.map(a => `
      <tr>
        <td><strong>${escHtml(a.job_title)}</strong></td>
        <td>${escHtml(a.company)}</td>
        <td>${escHtml(a.location||'')}</td>
        <td>${new Date(a.applied_at).toLocaleDateString()}</td>
        <td><span class="badge badge-${a.status}">${a.status.toUpperCase()}</span></td>
      </tr>`).join('');
  }
  init();
</script>
</body>
</html>
