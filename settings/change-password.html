<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - JSTACK</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="navbar">
  <h2>JSTACK</h2>
  <a href="account.html" style="color:white;">← Settings</a>
</header>

<div class="profile-card">
  <h3>Change Password</h3>
  <div id="alert-box"></div>
  <div class="input-group"><label>Current Password</label><input type="password" id="current" placeholder="Current password" required></div>
  <div class="input-group"><label>New Password</label><input type="password" id="newpass" placeholder="Min 6 characters" required minlength="6"></div>
  <div class="input-group"><label>Confirm New Password</label><input type="password" id="confirm" placeholder="Confirm new password" required></div>
  <button id="change-btn" onclick="handleChange()" style="width:100%;">Change Password</button>
</div>

<footer><p>© 2026 JSTACK</p></footer>

<script src="../assets/js/main.js"></script>
<script>
  async function init() { await requireLogin(); }

  async function handleChange() {
    clearAlert('alert-box');
    const newpass = document.getElementById('newpass').value;
    const confirm = document.getElementById('confirm').value;
    if (newpass !== confirm) { showAlert('alert-box', 'New passwords do not match.', 'error'); return; }
    setLoading('change-btn', true, 'Updating...');
    const res = await apiPost('/password.php?action=change', {
      current_password: document.getElementById('current').value,
      new_password:     newpass,
      confirm_password: confirm,
    });
    setLoading('change-btn', false);
    showAlert('alert-box', res.success ? 'Password changed successfully!' : (res.error||'Failed.'), res.success?'success':'error');
    if (res.success) document.querySelectorAll('input').forEach(i => i.value = '');
  }

  init();
</script>
</body>
</html>
